<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Briefing — OpsFlo AI</title>
<meta name="description" content="Daily Briefing Assistant — an AI-generated morning summary for managers and supervisors. Demo." />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="styles.css" rel="stylesheet" />
</head>
<body class="min-h-screen flex flex-col">

<!-- ═══════════ Segment 1: Top Navbar (logo + utility icons + user) ═══════════ -->
<nav id="topNav" class="w-full bg-white flex items-center flex-shrink-0 px-6 sticky top-0 z-50" style="height:72px;border-bottom:1px solid #ebe9f1;box-shadow:0 2px 6px 0 rgba(34,41,47,.06);">

  <!-- Logo (OpsFlo wordmark; graceful text fallback if it fails to load) -->
  <div class="flex items-center gap-2.5 flex-shrink-0">
    <img src="assets/logo.png" alt="OpsFlo" style="height:34px;object-fit:contain"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
    <span style="display:none" class="items-center gap-2">
      <span class="w-8 h-8 rounded-lg inline-block" style="background:linear-gradient(135deg,#5A8DEE,#94B5F4)"></span>
      <span class="font-bold text-lg" style="color:#5e5873">OpsFlo</span>
    </span>
  </div>
  <!-- Utility icons — Globe | Search | Sun | Grid | Bell | Avatar -->
  <div class="flex items-center gap-1 ml-auto flex-shrink-0">
    <button class="navbar-icon-btn" title="Language">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
    </button>
    <button class="navbar-icon-btn" title="Search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="navbar-icon-btn" title="Toggle theme">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
    <button class="navbar-icon-btn" title="Shortcuts">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
    </button>
    <button class="navbar-icon-btn relative" title="Notifications">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="absolute top-1 right-1 min-w-[16px] h-4 px-1 bg-[#ea5455] text-white text-[9px] font-bold rounded-full flex items-center justify-center leading-none">5</span>
    </button>
    <div class="w-px h-6 bg-[#ebe9f1] mx-1"></div>
    <button class="flex items-center gap-2 hover:bg-[#f8f7fa] rounded-lg px-2 py-1 transition-colors" title="Account">
      <div id="userAvatar" class="w-[38px] h-[38px] rounded-full bg-gradient-to-br from-[#5A8DEE] to-[#94B5F4] flex items-center justify-center text-white text-[13px] font-bold ring-2 ring-white shadow-sm">M</div>
      <div class="hidden xl:flex flex-col leading-none text-left">
        <span id="userNameTop" class="text-[13px] font-semibold text-[#5e5873]">Michael</span>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b9b9c3" stroke-width="2.5" class="hidden xl:block"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </div>
</nav>

<!-- ═══════════ Segment 2: Horizontal Menu Bar (nav items) ═══════════ -->
<div id="subNavBar" class="w-full bg-white flex-shrink-0 sticky top-[72px] z-40" style="border-bottom:1px solid #ebe9f1;">
  <div class="px-6 flex items-center" style="height:56px;">
    <nav class="flex items-center gap-0.5 overflow-x-auto" id="nav" style="scrollbar-width:none;"></nav>
  </div>
</div>

<!-- ═══════════ Main: persistent Daily Briefing dashboard ═══════════ -->
<div class="db-shell" id="dashboardShell">

  <aside class="db-sidebar" id="dbSidebar">
   <div class="db-sidebar-inner">
    <div class="db-sidebar-head">
      <div class="db-sidebar-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8 19 13M15 9h0M17.8 6.2 19 5M3 21l9-9M12.2 6.2 11 5"/></svg>
        AI Daily Briefing
      </div>
      <p class="db-sidebar-caption">Your AI-generated summary for</p>
      <div class="db-date-pill" title="This demo is fixed to a single day">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span id="dbDateLabel"></span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>

    <nav class="db-sidebar-nav" id="dbSidebarNav"></nav>

    <div class="db-about-card">
      <p id="dbAboutText" class="db-about-text"></p>
      <span class="role-chip">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8 19 13M15 9h0M17.8 6.2 19 5M3 21l9-9M12.2 6.2 11 5"/></svg>
        Powered by OpsFlo AI
      </span>
    </div>
   </div>
  </aside>

  <main class="db-main" id="dbMainScroll">
    <div id="dbHeader"></div>
    <div id="dashboardMain"></div>
  </main>

</div>

<!-- ═══════════ Bottom-right floating action ═══════════ -->
<button id="fabGenerate" class="fab-demo" title="Regenerate today's AI briefing">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8 19 13M15 9h0M17.8 6.2 19 5M3 21l9-9M12.2 6.2 11 5"/></svg>
  <span class="fab-label">Generate New Briefing</span>
</button>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
